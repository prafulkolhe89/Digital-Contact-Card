kind = "web"
previewPath = "/"
title = "Local Business Growth Card"
version = "1.0.0"
id = "artifacts/contact-card"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24596

[services.development]
run = "pnpm --filter @workspace/contact-card run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/contact-card", "run", "build" ]
publicDir = "artifacts/contact-card/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24596"
BASE_PATH = "/"
